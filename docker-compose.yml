services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo18
      POSTGRES_PASSWORD: sultan
      POSTGRES_DB: odoo18_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  web:
    build: .
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./custom-addons:/odoo/custom-addons
      - ./odoo.docker.conf:/odoo/odoo.conf

volumes:
  postgres_data:

